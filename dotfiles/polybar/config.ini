[colors]
background = #0c0c0c
#1E2127
background-alt = #373B41
foreground = #ffffff
#C5C8C6
primary = #41A55D
#41A55D
#61AFEF
#0780D7
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/example]
width = 100%
height = 24pt
radius = 4

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 1
padding-right = 2

module-margin = 1

modules-left = logos xworkspaces xwindow
modules-center = date
modules-right = sp spp sn cava pulseaudio tray  power


separator = 
separator-foreground = ${colors.disabled}

font-0 = MesloLGS NF ;3


cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html

[module/xworkspaces]
background = #1e1e2e
radius = 10

type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
#type = internal/xwindow
#label =  %{F#61AFEF} %{F#ffffff}%title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = " "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted =󰝟 muted
label-muted-foreground = ${colors.disabled}

# Use PA_VOLUME_UI_MAX (~153%) if true, or PA_VOLUME_NORM (100%) if false
# Default: true
use-ui-max = false

# Interval for volume increase/decrease (in percent points)
# Default: 5
interval = 5

[module/xkeyboard]
type = internal/xkeyboard
#blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.primary}

[module/date]
type = internal/date
interval = 1

date =%{F#41A55D}󰥔 %{F#FFFFFF}%H:%M
date-alt =%{F#41A55D}󰥔 %{F#FFFFFF}%Y-%m-%d %I:%M:%S %p

label = %date%
label-foreground = #27D64B

label-padding-left = 1
label-padding-right = 1

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini

[module/power]
type = custom/text
content = ""

click-left = ~/.config/polybar/scripts/powermenu.sh

[module/cava]
type = custom/script
tail = true
exec = $HOME/.config/polybar/scripts/cava.sh
format = <label>
format-font = 5
label = %output%

#Modulo de musica

[module/sn]
type = custom/text
content = " 󰒭 "
tail = true
format = <label>
content-background = ${colors.background}
click-left = playerctl next

[module/sp]
type = custom/text
content = " 󰒮 "
content-background = ${colors.background}
click-left = playerctl previous

[module/spp]
type = custom/script
interval = 0
exec = $HOME/.config/polybar/scripts/musicPlayer.sh
format = <label>
format-background = ${colors.background}
click-left = playerctl play-pause

[module/tray]
type = internal/tray

tray-size = 80%
tray-spacing = 6px
tray-padding = 2px
format-margin = 2px

